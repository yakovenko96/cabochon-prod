[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
    "__pycache__",
    "*.pyc",
    "cabochon-images.tar",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]
ignore = [
    # Odoo code commonly uses direct bool comparisons in domains and SQL-ish
    # structures where aggressive simplification can make intent less clear.
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"addons/**/__init__.py" = ["F401"]
"addons/**/__manifest__.py" = ["B018"]
